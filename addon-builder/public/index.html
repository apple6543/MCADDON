<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC Addon Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  :root {
    --bg: #0a0c0f;
    --bg2: #0f1218;
    --bg3: #151a21;
    --bg4: #1c2330;
    --border: #1e2835;
    --border2: #2a3545;
    --green: #4ade80;
    --green-dim: #166534;
    --green-glow: rgba(74,222,128,0.08);
    --amber: #fbbf24;
    --blue: #60a5fa;
    --red: #f87171;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #475569;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── header ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }

  .logo-block {
    width: 32px;
    height: 32px;
    background: var(--green);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-block svg { width: 18px; height: 18px; }

  .header-text h1 {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 15px;
    color: var(--text);
    letter-spacing: -0.01em;
    line-height: 1;
  }

  .header-text p {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--font-mono);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse-dot 2.5s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-label {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .model-badge {
    font-size: 10px;
    background: var(--bg4);
    border: 1px solid var(--border2);
    color: var(--amber);
    padding: 3px 8px;
    border-radius: 3px;
    font-family: var(--font-mono);
    letter-spacing: 0.03em;
  }

  .clear-btn {
    font-size: 10px;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text3);
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }

  .clear-btn:hover {
    border-color: var(--red);
    color: var(--red);
  }

  /* ── messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 0;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .msg-row {
    display: flex;
    gap: 0;
    padding: 0;
    border-bottom: 1px solid var(--border);
    animation: fadein 0.2s ease;
  }

  @keyframes fadein {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user { background: var(--bg2); }
  .msg-row.assistant { background: var(--bg); }
  .msg-row.assistant:hover { background: var(--bg2); transition: background 0.2s; }

  .msg-gutter {
    width: 52px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 16px;
    gap: 4px;
  }

  .msg-avatar {
    width: 26px;
    height: 26px;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    font-family: var(--font-mono);
    flex-shrink: 0;
  }

  .msg-row.user .msg-avatar {
    background: var(--bg4);
    border: 1px solid var(--border2);
    color: var(--blue);
  }

  .msg-row.assistant .msg-avatar {
    background: var(--green-dim);
    border: 1px solid var(--green);
    color: var(--green);
  }

  .msg-body {
    flex: 1;
    padding: 14px 20px 14px 0;
    min-width: 0;
  }

  .msg-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .msg-name {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .msg-row.user .msg-name { color: var(--blue); }
  .msg-row.assistant .msg-name { color: var(--green); }

  .msg-time {
    font-size: 10px;
    color: var(--text3);
  }

  .msg-content {
    font-size: 13.5px;
    line-height: 1.75;
    color: var(--text);
    font-family: var(--font-mono);
  }

  .msg-content p { margin-bottom: 10px; }
  .msg-content p:last-child { margin-bottom: 0; }

  .msg-content h1, .msg-content h2, .msg-content h3 {
    font-family: var(--font-display);
    color: var(--text);
    margin: 18px 0 8px;
    font-weight: 700;
  }

  .msg-content h1 { font-size: 18px; }
  .msg-content h2 { font-size: 15px; color: var(--amber); }
  .msg-content h3 { font-size: 13px; color: var(--green); letter-spacing: 0.04em; }

  .msg-content strong { color: var(--amber); font-weight: 600; }
  .msg-content em { color: var(--text2); font-style: italic; }

  .msg-content ul, .msg-content ol {
    padding-left: 20px;
    margin-bottom: 10px;
  }

  .msg-content li { margin-bottom: 4px; color: var(--text2); }
  .msg-content li::marker { color: var(--green); }

  .msg-content a { color: var(--blue); text-decoration: none; }
  .msg-content a:hover { text-decoration: underline; }

  .msg-content blockquote {
    border-left: 2px solid var(--green);
    padding-left: 12px;
    color: var(--text2);
    margin: 10px 0;
    font-style: italic;
  }

  .msg-content hr {
    border: none;
    border-top: 1px solid var(--border2);
    margin: 16px 0;
  }

  /* code */
  .msg-content code:not(pre code) {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--green);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 12px;
    font-family: var(--font-mono);
  }

  .msg-content pre {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 5px;
    margin: 12px 0;
    overflow: hidden;
  }

  .code-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    background: var(--bg4);
    border-bottom: 1px solid var(--border);
  }

  .code-lang {
    font-size: 10px;
    color: var(--amber);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: var(--font-mono);
  }

  .copy-btn {
    font-size: 10px;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text3);
    padding: 2px 8px;
    border-radius: 2px;
    cursor: pointer;
    font-family: var(--font-mono);
    transition: all 0.15s;
    letter-spacing: 0.04em;
  }

  .copy-btn:hover { border-color: var(--green); color: var(--green); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); }

  .msg-content pre code {
    display: block;
    padding: 14px;
    font-size: 12px;
    line-height: 1.6;
    overflow-x: auto;
    font-family: var(--font-mono);
    background: transparent !important;
  }

  .msg-content table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin: 12px 0;
  }

  .msg-content th {
    background: var(--bg4);
    color: var(--amber);
    padding: 6px 10px;
    text-align: left;
    border: 1px solid var(--border2);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .msg-content td {
    padding: 6px 10px;
    border: 1px solid var(--border);
    color: var(--text2);
  }

  .msg-content tr:nth-child(even) td { background: var(--bg2); }

  /* ── typing indicator ── */
  #typing-row {
    display: none;
    gap: 0;
    padding: 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .typing-dots {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 18px 20px 18px 0;
  }

  .typing-dots span {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--green);
    animation: bounce 1.2s ease-in-out infinite;
  }

  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* ── empty state ── */
  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    padding: 40px 20px;
    text-align: center;
  }

  .empty-icon {
    width: 56px;
    height: 56px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .empty-icon svg { width: 28px; height: 28px; }

  #empty-state h2 {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  #empty-state p {
    font-size: 12px;
    color: var(--text3);
    line-height: 1.6;
    max-width: 360px;
    font-family: var(--font-mono);
  }

  .quick-starts {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 480px;
    margin-top: 8px;
  }

  .qs-btn {
    font-size: 11px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text2);
    padding: 7px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-family: var(--font-mono);
    transition: all 0.15s;
    text-align: left;
    line-height: 1.4;
  }

  .qs-btn:hover {
    border-color: var(--green);
    color: var(--green);
    background: var(--green-glow);
  }

  /* ── input area ── */
  #input-area {
    border-top: 1px solid var(--border);
    background: var(--bg2);
    padding: 12px 16px;
    flex-shrink: 0;
  }

  .input-wrapper {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 8px 8px 8px 14px;
    transition: border-color 0.15s;
  }

  .input-wrapper:focus-within {
    border-color: var(--green);
    box-shadow: 0 0 0 2px var(--green-glow);
  }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.6;
    resize: none;
    max-height: 160px;
    overflow-y: auto;
    caret-color: var(--green);
  }

  #user-input::placeholder { color: var(--text3); }

  #user-input::-webkit-scrollbar { width: 3px; }
  #user-input::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  #send-btn {
    width: 32px;
    height: 32px;
    flex-shrink: 0;
    background: var(--green);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  #send-btn:hover { background: #86efac; transform: scale(1.04); }
  #send-btn:active { transform: scale(0.96); }
  #send-btn:disabled { background: var(--border2); cursor: not-allowed; transform: none; }

  #send-btn svg { width: 14px; height: 14px; }

  .input-hint {
    font-size: 10px;
    color: var(--text3);
    margin-top: 6px;
    text-align: center;
    letter-spacing: 0.04em;
  }

  /* ── error toast ── */
  #error-toast {
    display: none;
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a0f0f;
    border: 1px solid var(--red);
    color: var(--red);
    font-size: 12px;
    padding: 8px 16px;
    border-radius: 4px;
    font-family: var(--font-mono);
    z-index: 100;
    max-width: 90vw;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <div class="logo-block">
    <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="1" width="7" height="7" rx="1" fill="#0a0c0f"/>
      <rect x="10" y="1" width="7" height="7" rx="1" fill="#0a0c0f"/>
      <rect x="1" y="10" width="7" height="7" rx="1" fill="#0a0c0f"/>
      <rect x="10" y="10" width="7" height="7" rx="1" fill="#0a0c0f" opacity="0.4"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>MC Addon Builder</h1>
    <p>BEDROCK 1.21 · GROQ-POWERED</p>
  </div>
  <div class="header-right">
    <div class="status-dot" id="status-dot"></div>
    <span class="status-label" id="status-label">ready</span>
    <div class="model-badge">llama-3.3-70b</div>
    <button class="clear-btn" onclick="clearChat()">clear</button>
  </div>
</header>

<div id="messages">
  <div id="empty-state">
    <div class="empty-icon">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="11" height="11" rx="1.5" fill="#4ade80" opacity="0.9"/>
        <rect x="15" y="2" width="11" height="11" rx="1.5" fill="#4ade80" opacity="0.5"/>
        <rect x="2" y="15" width="11" height="11" rx="1.5" fill="#4ade80" opacity="0.5"/>
        <rect x="15" y="15" width="11" height="11" rx="1.5" fill="#4ade80" opacity="0.2"/>
      </svg>
    </div>
    <h2>What addon are we building?</h2>
    <p>Tell me your idea — even rough concepts. We'll plan everything before writing a single line of code.</p>
    <div class="quick-starts">
      <button class="qs-btn" onclick="quickStart('I want to make a horror AI mob that stalks players using the Groq API')">Horror AI mob that stalks players</button>
      <button class="qs-btn" onclick="quickStart('Build me a faction war addon with AI-powered mob commanders')">Faction war with AI commanders</button>
      <button class="qs-btn" onclick="quickStart('I want a custom dimension with AI NPCs that remember past conversations')">Custom dimension with memory NPCs</button>
      <button class="qs-btn" onclick="quickStart('Make a trading system where AI villagers negotiate prices dynamically')">AI villager negotiation system</button>
      <button class="qs-btn" onclick="quickStart('Create a boss fight addon where the boss AI adapts to the player\\'s fighting style')">Adaptive boss fight AI</button>
      <button class="qs-btn" onclick="quickStart('How does the Groq bridge server connect to Minecraft Bedrock?')">How does the Groq bridge work?</button>
    </div>
  </div>
  <div id="typing-row" class="msg-row assistant">
    <div class="msg-gutter">
      <div class="msg-avatar">AI</div>
    </div>
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-wrapper">
    <textarea id="user-input" rows="1" placeholder="Describe your addon idea..."></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Send (Enter)">
      <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 7h12M7 1l6 6-6 6" stroke="#0a0c0f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
  <div class="input-hint">enter to send · shift+enter for new line</div>
</div>

<div id="error-toast"></div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const typingRow = document.getElementById('typing-row');
const emptyState = document.getElementById('empty-state');
const statusLabel = document.getElementById('status-label');
const statusDot = document.getElementById('status-dot');
const errorToast = document.getElementById('error-toast');

let conversationHistory = [];
let isLoading = false;

marked.setOptions({
  breaks: true,
  gfm: true
});

const renderer = new marked.Renderer();
renderer.code = function(code, lang) {
  const language = lang || 'text';
  let highlighted;
  try {
    if (lang && hljs.getLanguage(lang)) {
      highlighted = hljs.highlight(code, { language: lang }).value;
    } else {
      highlighted = hljs.highlightAuto(code).value;
    }
  } catch(e) {
    highlighted = code.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  const id = 'cb-' + Math.random().toString(36).slice(2,8);
  return `<pre><div class="code-header"><span class="code-lang">${language}</span><button class="copy-btn" id="${id}" onclick="copyCode(this, ${JSON.stringify(code)})">copy</button></div><code class="hljs language-${language}">${highlighted}</code></pre>`;
};

marked.use({ renderer });

function copyCode(btn, code) {
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function getTime() {
  return new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
}

function setStatus(state) {
  if (state === 'thinking') {
    statusLabel.textContent = 'thinking...';
    statusDot.style.background = '#fbbf24';
    statusDot.style.boxShadow = '0 0 6px #fbbf24';
  } else {
    statusLabel.textContent = 'ready';
    statusDot.style.background = '#4ade80';
    statusDot.style.boxShadow = '0 0 6px #4ade80';
  }
}

function showError(msg) {
  errorToast.textContent = msg;
  errorToast.style.display = 'block';
  setTimeout(() => { errorToast.style.display = 'none'; }, 5000);
}

function appendMessage(role, content) {
  if (emptyState && emptyState.parentNode) {
    emptyState.remove();
  }

  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  const gutter = document.createElement('div');
  gutter.className = 'msg-gutter';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'user' ? 'ME' : 'AI';
  gutter.appendChild(avatar);

  const body = document.createElement('div');
  body.className = 'msg-body';

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  const nameEl = document.createElement('span');
  nameEl.className = 'msg-name';
  nameEl.textContent = role === 'user' ? 'you' : 'addon-ai';
  const timeEl = document.createElement('span');
  timeEl.className = 'msg-time';
  timeEl.textContent = getTime();
  meta.appendChild(nameEl);
  meta.appendChild(timeEl);

  const contentEl = document.createElement('div');
  contentEl.className = 'msg-content';

  if (role === 'assistant') {
    contentEl.innerHTML = marked.parse(content);
  } else {
    const p = document.createElement('p');
    p.textContent = content;
    contentEl.appendChild(p);
  }

  body.appendChild(meta);
  body.appendChild(contentEl);
  row.appendChild(gutter);
  row.appendChild(body);

  messagesEl.insertBefore(row, typingRow);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping(show) {
  typingRow.style.display = show ? 'flex' : 'none';
  if (show) messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  setStatus('thinking');
  showTyping(true);

  appendMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversationHistory })
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({ error: 'Unknown server error' }));
      throw new Error(errData.error || `Server error ${res.status}`);
    }

    const data = await res.json();
    const reply = data.content;

    conversationHistory.push({ role: 'assistant', content: reply });
    showTyping(false);
    appendMessage('assistant', reply);

  } catch (err) {
    showTyping(false);
    showError('Error: ' + err.message);
    conversationHistory.pop();
  }

  isLoading = false;
  sendBtn.disabled = false;
  setStatus('ready');
  inputEl.focus();
}

function quickStart(text) {
  inputEl.value = text;
  autoResize();
  sendMessage();
}

function clearChat() {
  conversationHistory = [];
  const rows = messagesEl.querySelectorAll('.msg-row:not(#typing-row)');
  rows.forEach(r => r.remove());

  if (!document.getElementById('empty-state')) {
    const es = document.createElement('div');
    es.id = 'empty-state';
    es.innerHTML = `
      <div class="empty-icon">
        <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="11" height="11" rx="1.5" fill="#4ade80" opacity="0.9"/>
          <rect x="15" y="2" width="11" height="11" rx="1.5" fill="#4ade80" opacity="0.5"/>
          <rect x="2" y="15" width="11" height="11" rx="1.5" fill="#4ade80" opacity="0.5"/>
          <rect x="15" y="15" width="11" height="11" rx="1.5" fill="#4ade80" opacity="0.2"/>
        </svg>
      </div>
      <h2>What addon are we building?</h2>
      <p>Tell me your idea — even rough concepts. We'll plan everything before writing a single line of code.</p>
      <div class="quick-starts">
        <button class="qs-btn" onclick="quickStart('I want to make a horror AI mob that stalks players using the Groq API')">Horror AI mob that stalks players</button>
        <button class="qs-btn" onclick="quickStart('Build me a faction war addon with AI-powered mob commanders')">Faction war with AI commanders</button>
        <button class="qs-btn" onclick="quickStart('I want a custom dimension with AI NPCs that remember past conversations')">Custom dimension with memory NPCs</button>
        <button class="qs-btn" onclick="quickStart('Make a trading system where AI villagers negotiate prices dynamically')">AI villager negotiation system</button>
        <button class="qs-btn" onclick="quickStart('Create a boss fight addon where the boss AI adapts to the player\\'s fighting style')">Adaptive boss fight AI</button>
        <button class="qs-btn" onclick="quickStart('How does the Groq bridge server connect to Minecraft Bedrock?')">How does the Groq bridge work?</button>
      </div>
    `;
    messagesEl.insertBefore(es, typingRow);
  }
}

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
}

inputEl.addEventListener('input', autoResize);

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
</body>
</html>
